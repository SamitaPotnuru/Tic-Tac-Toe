<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #0f172a;
      color: white;
    }
    h1 { margin-top: 20px; }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      gap: 10px;
      justify-content: center;
      margin: 20px auto;
    }
    .cell {
      width: 110px;
      height: 110px;
      background: #1e293b;
      border-radius: 10px;
      font-size: 2.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: 0.3s;
    }
    .cell:hover { background: #334155; }
    .winner {
      background: #22c55e !important;
      animation: pop 0.3s ease;
    }
    @keyframes pop {
      0% { transform: scale(0.8); }
      100% { transform: scale(1); }
    }
    button {
      padding: 10px 20px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      color: #0f172a;
      font-weight: bold;
    }
    button:hover { background: #0ea5e9; }
    .scoreboard {
      display: flex;
      justify-content: center;
      gap: 30px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1>🎮 Tic Tac Toe</h1>
  <div class="scoreboard">
    <div>X: <span id="scoreX">0</span></div>
    <div>O: <span id="scoreO">0</span></div>
  </div>
  <div class="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>
  <p id="status">Player X's Turn</p>
  <button onclick="restartGame()">Restart</button>

  <script>
    const cells = document.querySelectorAll(".cell");
    const statusText = document.getElementById("status");
    let board = ["", "", "", "", "", "", "", "", ""];
    let currentPlayer = "X";
    let gameActive = true;
    let scoreX = localStorage.getItem("scoreX") || 0;
    let scoreO = localStorage.getItem("scoreO") || 0;
    document.getElementById("scoreX").textContent = scoreX;
    document.getElementById("scoreO").textContent = scoreO;

    const winPatterns = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    cells.forEach(cell => cell.addEventListener("click", handleClick));

    function handleClick(e) {
      const index = e.target.dataset.index;
      if (board[index] !== "" || !gameActive) return;
      board[index] = currentPlayer;
      e.target.textContent = currentPlayer;
      if (checkWinner()) {
        statusText.textContent = `🎉 Player ${currentPlayer} Wins!`;
        highlightWinner();
        updateScore();
        gameActive = false;
        return;
      }
      if (!board.includes("")) {
        statusText.textContent = "😮 It's a Draw!";
        gameActive = false;
        return;
      }
      currentPlayer = currentPlayer === "X" ? "O" : "X";
      statusText.textContent = `Player ${currentPlayer}'s Turn`;
    }

    function checkWinner() {
      return winPatterns.some(([a,b,c]) => board[a] && board[a] === board[b] && board[a] === board[c]);
    }

    function highlightWinner() {
      winPatterns.forEach(([a,b,c]) => {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          cells[a].classList.add("winner");
          cells[b].classList.add("winner");
          cells[c].classList.add("winner");
        }
      });
    }

    function updateScore() {
      if (currentPlayer === "X") { scoreX++; localStorage.setItem("scoreX", scoreX); }
      else { scoreO++; localStorage.setItem("scoreO", scoreO); }
      document.getElementById("scoreX").textContent = scoreX;
      document.getElementById("scoreO").textContent = scoreO;
    }

    function restartGame() {
      board = ["", "", "", "", "", "", "", "", ""];
      gameActive = true;
      currentPlayer = "X";
      statusText.textContent = "Player X's Turn";
      cells.forEach(cell => { cell.textContent = ""; cell.classList.remove("winner"); });
    }
  </script>
</body>
</html>
